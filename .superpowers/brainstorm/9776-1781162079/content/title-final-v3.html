<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; font-family: 'Gill Sans', 'Gill Sans MT', Calibri, sans-serif; padding: 48px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #444; }
.slide { width: 640px; height: 360px; position: relative; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.8); display: grid; grid-template-columns: 48% 1fr; background: #000; }

/* LEFT panel */
.left { display: flex; flex-direction: column; justify-content: space-between; padding: 28px 36px 44px 36px; position: relative; z-index: 2; }
.left::after { content: ''; position: absolute; top: 16%; bottom: 16%; right: 0; width: 4px; background: #f8d418; }
.eyebrow { font-size: 8.5px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #f8d418; margin-bottom: 10px; }
h1 { font-size: 38px; font-weight: 900; font-style: italic; text-transform: uppercase; color: #fff; line-height: 0.95; letter-spacing: -1px; margin-bottom: 12px; }
.subtitle { font-size: 9px; color: #777; font-family: 'Courier New', monospace; line-height: 1.7; max-width: 210px; }

/* La Mundial logo bottom-left */
.brand-block { display: flex; flex-direction: column; gap: 5px; }
.brand-label { font-size: 7.5px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #444; }
.lm-logo { height: 28px; width: auto; object-fit: contain; object-position: left; filter: brightness(0) invert(1); opacity: 0.85; }

/* RIGHT panel — clean, no fade */
.right { position: relative; overflow: hidden; }
.right img.hero { width: 100%; height: 100%; object-fit: cover; object-position: center; }

/* PDC logo — bottom-right corner over image */
.pdc-block { position: absolute; bottom: 44px; right: 16px; z-index: 3; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.presented-by { font-size: 7px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
.pdc-logo { height: 28px; width: auto; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.9; }

/* Yellow footer + accent */
.footer-strip { position: absolute; bottom: 0; left: 0; right: 0; height: 34px; background: #f8d418; z-index: 4; display: flex; align-items: center; padding: 0 36px; justify-content: space-between; }
.footer-strip span { font-size: 8px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #000; }
.accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: #f8d418; z-index: 4; }
</style>
</head>
